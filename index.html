<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Pisces: Space Journey</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&family=Courier+New&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- LỚP PHỦ EASTER EGG BẢO VỆ TOÀN MÀN HÌNH --- */
        #easter-egg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99999;
            background: #000;
        }

        #star-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #ui-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: all;
            background: rgba(10, 25, 47, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: background 1s ease, backdrop-filter 1s ease;
        }

        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #start-hyperjump-btn {
            padding: 15px 40px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
            font-size: 1.2rem;
            font-family: inherit;
            background: linear-gradient(45deg, #00e5ff, #007bff);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #start-hyperjump-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.7);
        }

        #loading-screen {
            background: transparent;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .progress-container {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00e5ff;
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #00e5ff;
            box-shadow: 0 0 15px #00e5ff;
            /* SỬA: Đường cong cubic-bezier giúp thanh chạy cực chậm khúc đầu và vút nhanh khúc cuối */
            transition: width 3.5s cubic-bezier(0.55, 0.085, 0.68, 0.53);
        }

        /* --- HIỆU ỨNG LÓA SÁNG KHI ĐẾN NƠI --- */
        #white-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            opacity: 0;
            z-index: 9999999;
            pointer-events: none;
            transition: opacity 0.1s;
            /* Sẽ được điều khiển bằng JS */
        }
    </style>
</head>

<body>
    <div id="white-flash"></div>

    <canvas id="gameCanvas"></canvas>
    <div id="pause-overlay">
        <h2 id="pause-title">SYSTEM PAUSED</h2>
        <p id="pause-subtitle">Press RESUME to continue</p>
        <button id="resume-btn">RESUME</button>

        <div id="resume-progress-container">
            <div id="resume-progress-bar"></div>
        </div>
    </div>

    <button id="startBtn" style="display: none;">Start</button>

    <div id="easter-egg-overlay">
        <canvas id="star-canvas"></canvas>

        <div id="ui-wrapper">
            <div id="lock-screen">
                <h1
                    style="color: #00e5ff; font-size: 3.5rem; text-shadow: 0 0 25px rgba(0, 229, 255, 0.8); margin-bottom: 40px; font-family: 'Playfair Display', serif; letter-spacing: 3px;">
                    Pisces: Space Journey
                </h1>

                <button id="start-hyperjump-btn">Initiate Hyperjump</button>
            </div>

            <div id="loading-screen">
                <h1
                    style="color: #fff; letter-spacing: 3px; text-shadow: 0 0 15px #fff; font-family: 'Playfair Display', serif;">
                    SYSTEM LOADING
                </h1>
                <p style="color: #fff; font-family: 'Roboto', sans-serif; margin-bottom: 0;">Initiating hyperdrive
                    jump...</p>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            const starCanvas = document.getElementById('star-canvas');
            const ctx = starCanvas.getContext('2d');

            let width = window.innerWidth;
            let height = window.innerHeight;
            starCanvas.width = width;
            starCanvas.height = height;

            const stars = [];
            const numStars = 7000; // Tăng số lượng sao lên rất nhiều để tạo độ sâu
            let speed = 0.8;
            let isWarping = false;
            let isSimulationRunning = true;
            let warpStartTime = 0;

            // --- TẠO CÁC CHÒM SAO HOÀNG ĐẠO BẤT ĐỘNG ---
            const constellations = [
                // Pisces (Cung Song Ngư - Ở giữa)
                {
                    points: [
                        { x: -0.2, y: -0.2 }, { x: -0.15, y: -0.25 }, { x: -0.1, y: -0.15 }, { x: -0.18, y: -0.1 }, // Cá 1
                        { x: -0.08, y: -0.05 }, { x: 0, y: 0 }, { x: 0.1, y: 0.05 }, // Dây nối
                        { x: 0.18, y: 0.02 }, { x: 0.25, y: 0.05 }, { x: 0.28, y: 0.15 }, { x: 0.15, y: 0.12 } // Cá 2
                    ],
                    links: [
                        [0, 1], [1, 2], [2, 3], [3, 0],
                        [3, 4], [4, 5], [5, 6], [6, 7],
                        [7, 8], [8, 9], [9, 10], [10, 7]
                    ]
                },
                // Aries (Bạch Dương - Góc trên phải)
                {
                    points: [{ x: 0.25, y: -0.3 }, { x: 0.3, y: -0.35 }, { x: 0.4, y: -0.38 }, { x: 0.45, y: -0.32 }],
                    links: [[0, 1], [1, 2], [2, 3]]
                },
                // Scorpius (Thiên Yết - Góc dưới trái)
                {
                    points: [
                        { x: -0.4, y: 0.2 }, { x: -0.35, y: 0.25 }, { x: -0.3, y: 0.35 },
                        { x: -0.2, y: 0.38 }, { x: -0.15, y: 0.3 }, { x: -0.18, y: 0.25 }
                    ],
                    links: [[0, 1], [1, 2], [2, 3], [3, 4], [4, 5]]
                }
            ];

            // Thêm hiệu ứng nhấp nháy cho các vì sao trong chòm sao
            constellations.forEach(c => {
                c.points.forEach(p => {
                    p.twinkleOffset = Math.random() * Math.PI * 2;
                    p.twinkleSpeed = 0.001 + Math.random() * 0.002;
                    p.size = 1.5 + Math.random() * 1.5;
                });
            });

            // TẠO CÁC VÌ SAO CHUYỂN ĐỘNG VỚI MÀU SẮC & ĐỘ SÂU (PARALLAX)
            for (let i = 0; i < numStars; i++) {
                let isDistant = Math.random() < 0.25;
                let colorType = Math.random();
                let r = 255, g = 255, b = 255;

                if (isDistant) {
                    if (colorType < 0.33) { r = 150; g = 220; b = 255; } // Xanh ngọc
                    else if (colorType < 0.66) { r = 255; g = 180; b = 220; } // Hồng
                    else { r = 220; g = 150; b = 255; } // Tím
                }

                stars.push({
                    x: (Math.random() - 0.5) * width * 2,
                    y: (Math.random() - 0.5) * height * 2,
                    z: Math.random() * width,
                    r: r, g: g, b: b,
                    speedMod: isDistant ? (0.1 + Math.random() * 0.2) : (1 + Math.random() * 0.5),
                    sizeMod: isDistant ? (Math.random() * 2 + 1.5) : (Math.random() * 1.2 + 0.5)
                });
            }

            function drawStars() {
                if (!isSimulationRunning) return;

                const cx = width / 2;
                const cy = height / 2;

                if (isWarping) {
                    // Áp dụng gia tốc mũ 4 (Bắt đầu rất chậm, vuốt cực nhanh ở cuối)
                    let progress = (Date.now() - warpStartTime) / 3500;
                    if (progress > 1) progress = 1;
                    speed = 0.8 + Math.pow(progress, 4) * 200;

                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                } else {
                    speed = 0.8;
                    ctx.fillStyle = '#000000';
                }

                ctx.fillRect(0, 0, width, height);

                // --- VẼ CHÒM SAO HOÀNG ĐẠO BẤT ĐỘNG TẠI BACKGROUND ---
                let constellationAlpha = isWarping ? Math.max(0, 1 - (Date.now() - warpStartTime) / 1500) : 0.7;
                if (constellationAlpha > 0) {
                    constellations.forEach(c => {
                        // Vẽ đường nối
                        ctx.strokeStyle = `rgba(0, 229, 255, ${constellationAlpha * 0.3})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        c.links.forEach(link => {
                            let p1 = c.points[link[0]];
                            let p2 = c.points[link[1]];
                            ctx.moveTo(cx + p1.x * width, cy + p1.y * width);
                            ctx.lineTo(cx + p2.x * width, cy + p2.y * width);
                        });
                        ctx.stroke();

                        // Vẽ sao sáng
                        c.points.forEach(p => {
                            let tw = Math.sin(Date.now() * p.twinkleSpeed + p.twinkleOffset);
                            let starAlpha = constellationAlpha * (0.4 + 0.6 * tw);

                            ctx.fillStyle = `rgba(200, 255, 255, ${starAlpha})`;
                            ctx.beginPath();
                            ctx.arc(cx + p.x * width, cy + p.y * width, p.size + tw * 0.5, 0, Math.PI * 2);
                            ctx.fill();

                            // Hào quang
                            ctx.fillStyle = `rgba(0, 229, 255, ${starAlpha * 0.4})`;
                            ctx.beginPath();
                            ctx.arc(cx + p.x * width, cy + p.y * width, p.size * 3, 0, Math.PI * 2);
                            ctx.fill();
                        });
                    });
                }

                // --- VẼ SAO CHUYỂN ĐỘNG ---
                for (let i = 0; i < numStars; i++) {
                    let star = stars[i];
                    let currentStarSpeed = speed * star.speedMod;
                    star.z -= currentStarSpeed;

                    if (star.z <= 0) {
                        star.x = (Math.random() - 0.5) * width * 2;
                        star.y = (Math.random() - 0.5) * height * 2;
                        star.z = width;
                    }

                    let px = cx + (star.x / star.z) * width;
                    let py = cy + (star.y / star.z) * width;

                    let radius = (width / star.z) * star.sizeMod;
                    radius = Math.max(1, Math.min(8, radius));

                    let alpha = 1.5 - (star.z / width);
                    alpha = Math.max(0.1, Math.min(1, alpha));

                    if (isWarping) {
                        let prevZ = star.z + currentStarSpeed;
                        let prevPx = cx + (star.x / prevZ) * width;
                        let prevPy = cy + (star.y / prevZ) * width;

                        ctx.lineWidth = radius;
                        ctx.strokeStyle = `rgba(${star.r}, ${star.g}, ${star.b}, ${alpha})`;
                        ctx.beginPath();
                        ctx.moveTo(prevPx, prevPy);
                        ctx.lineTo(px, py);
                        ctx.stroke();
                    } else {
                        ctx.fillStyle = `rgba(${star.r}, ${star.g}, ${star.b}, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(px, py, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                requestAnimationFrame(drawStars);
            }
            drawStars();

            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                starCanvas.width = width;
                starCanvas.height = height;
            });

            // LOGIC XỬ LÝ GIAO DIỆN CHUYỂN CẢNH
            const lockScreen = document.getElementById('lock-screen');
            const loadingScreen = document.getElementById('loading-screen');
            const uiWrapper = document.getElementById('ui-wrapper');
            const easterEggOverlay = document.getElementById('easter-egg-overlay');
            const progressBar = document.getElementById('progress-bar');
            const startHyperjumpBtn = document.getElementById('start-hyperjump-btn');
            const realStartBtn = document.getElementById('startBtn');
            const whiteFlash = document.getElementById('white-flash');

            startHyperjumpBtn.addEventListener('click', () => {
                lockScreen.style.display = 'none';
                uiWrapper.style.backdropFilter = 'none';
                uiWrapper.style.background = 'transparent';
                loadingScreen.style.display = 'flex';

                isWarping = true;
                warpStartTime = Date.now();

                // Bắt đầu chạy thanh loading trong 3.5s
                setTimeout(() => {
                    progressBar.style.width = '100%';
                }, 50);

                // Giây thứ 2.5: Bắt đầu chớp sáng trắng che mắt
                setTimeout(() => {
                    whiteFlash.style.transition = 'opacity 1s ease-in';
                    whiteFlash.style.opacity = '1';
                }, 2500);

                // Giây thứ 3.5: Ánh sáng đạt đỉnh, gỡ màn hình chờ, bật game ẩn bên dưới
                setTimeout(() => {
                    isSimulationRunning = false;
                    easterEggOverlay.style.display = 'none';

                    if (realStartBtn) {
                        realStartBtn.style.display = 'none';
                        realStartBtn.click();
                    }

                    // Kéo màn trập ánh sáng xuống lộ ra phi thuyền
                    setTimeout(() => {
                        whiteFlash.style.transition = 'opacity 1.5s ease-out';
                        whiteFlash.style.opacity = '0';
                    }, 100);
                }, 3500);
            });
        })();
    </script>

    <script src="js/config.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/render.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
