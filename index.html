<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thần Binh Thiên Hà - Final Secret Edition</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&family=Courier+New&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #easter-egg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99999;
            background: #000;
        }

        #star-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #ui-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: all;
            background: rgba(10, 25, 47, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #password-input {
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #00e5ff;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            width: 250px;
            font-family: inherit;
        }

        #unlock-btn,
        #fake-start-btn {
            padding: 12px 35px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
        }

        #unlock-btn {
            background: linear-gradient(45deg, #f72585, #7209b7);
            box-shadow: 0 0 15px rgba(247, 37, 133, 0.4);
        }

        #fake-start-btn {
            display: none;
            background: linear-gradient(45deg, #00e5ff, #007bff);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        #error-msg {
            color: #f72585;
            font-size: 0.9rem;
            margin-top: 15px;
            visibility: hidden;
            text-shadow: 0 0 5px red;
        }

        #loading-screen {
            background: transparent;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .progress-container {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00e5ff;
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
            position: relative;
        }

        #prog-bar {
            height: 100%;
            width: 0%;
            background: #00e5ff;
            box-shadow: 0 0 15px #00e5ff;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>
    <button id="startBtn">Start</button>

    <div id="easter-egg-overlay">
        <canvas id="star-canvas"></canvas>
        <div id="ui-wrapper">
            <div id="lock-screen">
                <h1
                    style="color: #f72585; font-size: 2.5rem; text-shadow: 0 0 15px #f72585; margin-bottom: 5px; font-family: 'Playfair Display', serif;">
                    RESTRICTED AREA</h1>
                <p style="color: #a0c4ff; margin-bottom: 30px; font-family: 'Roboto', sans-serif;">This fairy tale is
                    classified. Enter password to unlock.</p>
                <input type="password" id="password-input" placeholder="Enter password...">
                <button id="unlock-btn">Unlock Story</button>
                <button id="fake-start-btn">View Fairy Tale</button>
                <p id="error-msg">❌ Access Denied: Incorrect Password.</p>
            </div>
            <div id="loading-screen">
                <h1
                    style="color: #fff; letter-spacing: 3px; text-shadow: 0 0 15px #fff; font-family: 'Playfair Display', serif;">
                    SYSTEM LOADING</h1>
                <p style="color: #fff; font-family: 'Roboto', sans-serif; margin-bottom: 0;">Initiating hyperdrive
                    jump...</p>
                <div class="progress-container">
                    <div id="prog-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const canvas = document.getElementById('star-canvas');
            const ctx = canvas.getContext('2d');
            let w = canvas.width = window.innerWidth;
            let h = canvas.height = window.innerHeight;

            const stars = [];
            const numStars = 3000;
            let speed = 0.5, targetSpeed = 0.5;
            let isRunning = true, isWarping = false;

            // Shooting Star & Particle System
            const shootingStars = [];
            const trailParticles = [];
            let lastSS = Date.now();

            // Khởi tạo 3000 ngôi sao
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * w * 2.5,
                    y: (Math.random() - 0.5) * h * 2.5,
                    z: Math.random() * w,
                    pz: 0
                });
                stars[i].pz = stars[i].z;
            }

            function spawnSS() {
                shootingStars.push({
                    x: Math.random() * w + w / 2, y: -50,
                    vx: -(Math.random() * 5 + 10), vy: Math.random() * 5 + 10,
                    size: 2, opacity: 1
                });
            }

            function draw() {
                if (!isRunning) return;
                if (!isWarping && Date.now() - lastSS > 5000) { spawnSS(); lastSS = Date.now(); }

                speed += (targetSpeed - speed) * 0.025;
                ctx.fillStyle = isWarping ? 'rgba(0,0,0,0.3)' : '#000';
                ctx.fillRect(0, 0, w, h);

                // 1. VẼ SAO NỀN (STARFIELD)
                for (let s of stars) {
                    s.pz = s.z; s.z -= speed;
                    if (s.z <= 0) {
                        s.z = w;
                        s.x = (Math.random() - 0.5) * w * 2.5;
                        s.y = (Math.random() - 0.5) * h * 2.5;
                        s.pz = w;
                    }
                    let px = w / 2 + (s.x / s.z) * w, py = h / 2 + (s.y / s.z) * w;
                    let ppx = w / 2 + (s.x / s.pz) * w, ppy = h / 2 + (s.y / s.pz) * w;

                    let alpha = Math.min(1, 1.2 - s.z / w);
                    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                    ctx.lineWidth = Math.min(3, (w / s.z) * 0.8);

                    ctx.beginPath();
                    if (!isWarping && Math.abs(px - ppx) < 1) {
                        ctx.arc(px, py, ctx.lineWidth / 2, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
                        ctx.fill();
                    } else {
                        ctx.moveTo(ppx, ppy); ctx.lineTo(px, py); ctx.stroke();
                    }
                }

                // 2. VẼ SAO BĂNG & HẠT RƠI (SHOOTING STARS & BLINK PARTICLES)
                for (let i = shootingStars.length - 1; i >= 0; i--) {
                    let s = shootingStars[i];
                    s.x += s.vx; s.y += s.vy;
                    if (s.x < -100 || s.y > h + 100) { shootingStars.splice(i, 1); continue; }

                    // Tạo hạt rơi ra (Blink blink)
                    if (Math.random() > 0.3) {
                        trailParticles.push({
                            x: s.x, y: s.y,
                            vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
                            life: 1, size: Math.random() * 3 + 1
                        });
                    }

                    // Vẽ sao băng chính (Glow như cursor)
                    ctx.save();
                    ctx.shadowBlur = 15; ctx.shadowColor = '#00e5ff';
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, 7); ctx.fill();

                    // Đuôi tia chớp nhỏ
                    ctx.strokeStyle = 'rgba(0, 229, 255, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(s.x, s.y);
                    ctx.lineTo(s.x - s.vx * 5, s.y - s.vy * 5); ctx.stroke();
                    ctx.restore();
                }

                // Vẽ các hạt blink rơi ra
                for (let i = trailParticles.length - 1; i >= 0; i--) {
                    let p = trailParticles[i];
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    if (p.life <= 0) { trailParticles.splice(i, 1); continue; }

                    ctx.fillStyle = `rgba(0, 229, 255, ${p.life})`;
                    if (Math.random() > 0.5) ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`; // Hiệu ứng nhấp nháy trắng xanh
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, 7); ctx.fill();
                }

                requestAnimationFrame(draw);
            }
            draw();

            // Logic Mật khẩu & Chạy Game
            const SECRET = 'a3NhbWFzdXByZW1hY3k=';
            document.getElementById('unlock-btn').onclick = () => {
                const inp = document.getElementById('password-input');
                if (btoa(inp.value) === SECRET) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('fake-start-btn').style.display = 'block';
                } else { document.getElementById('error-msg').style.visibility = 'visible'; inp.value = ''; }
            };

            document.getElementById('fake-start-btn').onclick = () => {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('ui-wrapper').style.background = 'transparent';
                document.getElementById('ui-wrapper').style.backdropFilter = 'none';
                document.getElementById('loading-screen').style.display = 'flex';

                isWarping = true; targetSpeed = 60;
                let p = 0; const b = document.getElementById('prog-bar');
                const iv = setInterval(() => {
                    p += 0.8; b.style.width = p + '%';
                    if (p >= 100) clearInterval(iv);
                }, 20);

                setTimeout(() => {
                    isRunning = false;
                    document.getElementById('easter-egg-overlay').style.display = 'none';
                    const realBtn = document.getElementById('startBtn');
                    if (realBtn) { realBtn.style.display = 'none'; realBtn.click(); }
                }, 3000);
            };

            window.onresize = () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; };
        })();
    </script>

    <script src="js/config.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/render.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
