<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thần Binh Thiên Hà - Top Secret Edition</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&family=Courier+New&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Lớp phủ che toàn bộ game lúc đầu */
        #easter-egg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99999;
            background: #000;
        }

        #star-canvas-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #ui-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: all;
            background: rgba(10, 25, 47, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #password-input {
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #00e5ff;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            width: 250px;
            font-family: inherit;
        }

        #unlock-btn,
        #fake-start-btn {
            padding: 12px 35px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
        }

        #unlock-btn {
            background: linear-gradient(45deg, #f72585, #7209b7);
            box-shadow: 0 0 15px rgba(247, 37, 133, 0.4);
        }

        #fake-start-btn {
            display: none;
            background: linear-gradient(45deg, #00e5ff, #007bff);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        #error-msg {
            color: #f72585;
            font-size: 0.9rem;
            margin-top: 15px;
            visibility: hidden;
            text-shadow: 0 0 5px red;
        }

        #loading-screen {
            background: transparent;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .progress-container {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00e5ff;
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
            position: relative;
        }

        #prog-bar-fill {
            height: 100%;
            width: 0%;
            background: #00e5ff;
            box-shadow: 0 0 15px #00e5ff;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>
    <button id="startBtn">Start</button>

    <div id="easter-egg-overlay">
        <canvas id="star-canvas-ui"></canvas>
        <div id="ui-wrapper">
            <div id="lock-screen">
                <h1
                    style="color: #f72585; font-size: 2.5rem; text-shadow: 0 0 15px #f72585; margin-bottom: 5px; font-family: 'Playfair Display', serif;">
                    RESTRICTED AREA</h1>
                <p style="color: #a0c4ff; margin-bottom: 30px; font-family: 'Roboto', sans-serif;">This fairy tale is
                    classified. Enter password to unlock.</p>
                <input type="password" id="password-input" placeholder="Enter password...">
                <button id="unlock-btn">Unlock Story</button>
                <button id="fake-start-btn">View Fairy Tale</button>
                <p id="error-msg">❌ Access Denied: Incorrect Password.</p>
            </div>
            <div id="loading-screen">
                <h1
                    style="color: #fff; letter-spacing: 3px; text-shadow: 0 0 15px #fff; font-family: 'Playfair Display', serif;">
                    SYSTEM LOADING</h1>
                <p style="color: #fff; font-family: 'Roboto', sans-serif; margin-bottom: 0;">Initiating hyperdrive
                    jump...</p>
                <div class="progress-container">
                    <div id="prog-bar-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (() => {
            const uiCanvas = document.getElementById('star-canvas-ui');
            const uiCtx = uiCanvas.getContext('2d');
            let w = uiCanvas.width = window.innerWidth;
            let h = uiCanvas.height = window.innerHeight;

            const stars = [];
            const shootingStars = [];
            const blinkParticles = [];
            let speed = 0.5;
            let targetSpeed = 0.5;
            let isWarping = false;
            let isLoopRunning = true;
            let lastSSSpawn = Date.now();

            // Khởi tạo 3000 ngôi sao với phân bổ đều
            for (let i = 0; i < 3000; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * w * 2.5,
                    y: (Math.random() - 0.5) * h * 2.5,
                    z: Math.random() * w,
                    pz: 0
                });
                stars[i].pz = stars[i].z;
            }

            function spawnShootingStar() {
                shootingStars.push({
                    x: Math.random() * w + w / 2, y: -50,
                    vx: -(Math.random() * 4 + 10), vy: Math.random() * 4 + 8,
                    size: 2, life: 1
                });
            }

            function draw() {
                if (!isLoopRunning) return;

                // Gia tốc mượt mà
                speed += (targetSpeed - speed) * 0.02;

                // Spawn sao băng mỗi 5s
                if (!isWarping && Date.now() - lastSSSpawn > 5000) {
                    spawnShootingStar();
                    lastSSSpawn = Date.now();
                }

                uiCtx.fillStyle = isWarping ? 'rgba(0,0,0,0.3)' : '#000';
                uiCtx.fillRect(0, 0, w, h);

                // --- VẼ SAO NỀN ---
                for (let s of stars) {
                    s.pz = s.z;
                    s.z -= speed;

                    if (s.z <= 0) {
                        s.z = w;
                        s.x = (Math.random() - 0.5) * w * 2.5;
                        s.y = (Math.random() - 0.5) * h * 2.5;
                        s.pz = w;
                    }

                    let px = w / 2 + (s.x / s.z) * w;
                    let py = h / 2 + (s.y / s.z) * w;
                    let ppx = w / 2 + (s.x / s.pz) * w;
                    let ppy = h / 2 + (s.y / s.pz) * w;

                    // Sao bay gần màn hình (z nhỏ) sẽ sáng rõ và to hơn
                    let alpha = Math.min(1, 1.2 - s.z / w);
                    let radius = Math.min(4, (w / s.z) * 0.8);

                    uiCtx.strokeStyle = `rgba(255,255,255,${alpha})`;
                    uiCtx.lineWidth = radius;

                    uiCtx.beginPath();
                    if (!isWarping && Math.abs(px - ppx) < 1) {
                        // Vẽ chấm tròn nếu đang đứng yên/trôi chậm
                        uiCtx.arc(px, py, radius / 2, 0, Math.PI * 2);
                        uiCtx.fillStyle = `rgba(255,255,255,${alpha})`;
                        uiCtx.fill();
                    } else {
                        // Vẽ vệt dài trắng muốt nếu đang bay nhanh
                        uiCtx.moveTo(ppx, ppy);
                        uiCtx.lineTo(px, py);
                        uiCtx.stroke();
                    }
                }

                // --- VẼ SAO BĂNG & HẠT GLOW ---
                for (let i = shootingStars.length - 1; i >= 0; i--) {
                    let ss = shootingStars[i];
                    ss.x += ss.vx; ss.y += ss.vy;
                    if (ss.x < -100 || ss.y > h + 100) { shootingStars.splice(i, 1); continue; }

                    // Tạo hạt rơi ra (Blink blink)
                    if (Math.random() > 0.4) {
                        blinkParticles.push({
                            x: ss.x, y: ss.y,
                            vx: (Math.random() - 0.5) * 2, vy: (Math.random() - 0.5) * 2,
                            life: 1, size: Math.random() * 3 + 1
                        });
                    }

                    uiCtx.save();
                    uiCtx.shadowBlur = 15; uiCtx.shadowColor = '#00e5ff';
                    uiCtx.fillStyle = '#fff';
                    uiCtx.beginPath(); uiCtx.arc(ss.x, ss.y, ss.size, 0, 7); uiCtx.fill();
                    uiCtx.restore();
                }

                // Vẽ các hạt blink rụng dọc đường
                for (let i = blinkParticles.length - 1; i >= 0; i--) {
                    let p = blinkParticles[i];
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    if (p.life <= 0) { blinkParticles.splice(i, 1); continue; }
                    uiCtx.fillStyle = Math.random() > 0.5 ? `rgba(0, 229, 255, ${p.life})` : `rgba(255, 255, 255, ${p.life})`;
                    uiCtx.beginPath(); uiCtx.arc(p.x, p.y, p.size * p.life, 0, 7); uiCtx.fill();
                }

                requestAnimationFrame(draw);
            }
            draw();

            // Xử lý Mật khẩu
            const SECRET_HASH = 'a3NhbWFzdXByZW1hY3k='; // ksamasupremacy
            document.getElementById('unlock-btn').onclick = () => {
                const input = document.getElementById('password-input');
                if (btoa(input.value) === SECRET_HASH) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('fake-start-btn').style.display = 'block';
                } else {
                    document.getElementById('error-msg').style.visibility = 'visible';
                    input.value = '';
                }
            };

            // Bắt đầu nhảy Warp và Game
            document.getElementById('fake-start-btn').onclick = () => {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('ui-wrapper').style.background = 'transparent';
                document.getElementById('ui-wrapper').style.backdropFilter = 'none';
                document.getElementById('loading-screen').style.display = 'flex';

                isWarping = true;
                targetSpeed = 55; // Ép ga tối đa

                let progress = 0;
                const bar = document.getElementById('prog-bar-fill');
                const interval = setInterval(() => {
                    progress += 0.85;
                    bar.style.width = Math.min(100, progress) + '%';
                    if (progress >= 100) clearInterval(interval);
                }, 25);

                setTimeout(() => {
                    isLoopRunning = false;
                    document.getElementById('easter-egg-overlay').style.display = 'none';
                    const realStart = document.getElementById('startBtn');
                    if (realStart) {
                        realStart.style.display = 'none';
                        realStart.click(); // Kích hoạt game sau khi Warp xong
                    }
                }, 3000);
            };

            window.onresize = () => { w = uiCanvas.width = window.innerWidth; h = uiCanvas.height = window.innerHeight; };
        })();
    </script>

    <script src="js/config.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/render.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
