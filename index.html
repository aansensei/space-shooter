<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thần Binh Thiên Hà - Final Secret Edition</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&family=Courier+New&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #easter-egg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99999;
            background: #000;
        }

        #star-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #ui-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: all;
            background: rgba(10, 25, 47, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #password-input {
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #00e5ff;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            width: 250px;
            font-family: inherit;
        }

        #unlock-btn,
        #fake-start-btn {
            padding: 12px 35px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
        }

        #unlock-btn {
            background: linear-gradient(45deg, #f72585, #7209b7);
            box-shadow: 0 0 15px rgba(247, 37, 133, 0.4);
        }

        #fake-start-btn {
            display: none;
            background: linear-gradient(45deg, #00e5ff, #007bff);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        #error-msg {
            color: #f72585;
            font-size: 0.9rem;
            margin-top: 15px;
            visibility: hidden;
            text-shadow: 0 0 5px red;
        }

        #loading-screen {
            background: transparent;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .progress-container {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00e5ff;
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
            position: relative;
        }

        #prog-bar {
            height: 100%;
            width: 0%;
            background: #00e5ff;
            box-shadow: 0 0 15px #00e5ff;
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>
    <button id="startBtn">Start</button>

    <div id="easter-egg-overlay">
        <canvas id="star-canvas"></canvas>
        <div id="ui-wrapper">
            <div id="lock-screen">
                <h1
                    style="color: #f72585; font-size: 2.5rem; text-shadow: 0 0 15px #f72585; margin-bottom: 5px; font-family: 'Playfair Display', serif;">
                    RESTRICTED AREA</h1>
                <p style="color: #a0c4ff; margin-bottom: 30px; font-family: 'Roboto', sans-serif;">This fairy tale is
                    classified. Enter password to unlock.</p>
                <input type="password" id="password-input" placeholder="Enter password...">
                <button id="unlock-btn">Unlock Story</button>
                <button id="fake-start-btn">View Fairy Tale</button>
                <p id="error-msg">❌ Access Denied: Incorrect Password.</p>
            </div>
            <div id="loading-screen">
                <h1
                    style="color: #fff; letter-spacing: 3px; text-shadow: 0 0 15px #fff; font-family: 'Playfair Display', serif;">
                    SYSTEM LOADING</h1>
                <p style="color: #fff; font-family: 'Roboto', sans-serif; margin-bottom: 0;">Initiating hyperdrive
                    jump...</p>
                <div class="progress-container">
                    <div id="prog-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const starCanvas = document.getElementById('star-canvas');
            const starCtx = starCanvas.getContext('2d');
            let w = starCanvas.width = window.innerWidth;
            let h = starCanvas.height = window.innerHeight;

            const stars = [];
            const numStars = 3000;
            let speed = 0.2, targetSpeed = 0.2;
            let isRunning = true, isWarping = false;

            // Shooting Star System
            const shootingStars = [];
            let lastSS = Date.now();

            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * w * 2,
                    y: (Math.random() - 0.5) * h * 2,
                    z: Math.random() * w,
                    pz: 0
                });
                stars[i].pz = stars[i].z;
            }

            function spawnSS() {
                shootingStars.push({
                    x: Math.random() * w + w / 4, y: -50,
                    vx: -(Math.random() * 4 + 8), vy: Math.random() * 4 + 8,
                    len: Math.random() * 100 + 150, opacity: 1
                });
            }

            function draw() {
                if (!isRunning) return;
                if (!isWarping && Date.now() - lastSS > 5000) { spawnSS(); lastSS = Date.now(); }

                speed += (targetSpeed - speed) * 0.02;
                starCtx.fillStyle = '#000';
                starCtx.fillRect(0, 0, w, h);

                // DRAW STARS
                for (let s of stars) {
                    s.pz = s.z; s.z -= speed;
                    if (s.z <= 0) { s.z = w; s.pz = w; }
                    let px = w / 2 + (s.x / s.z) * w, py = h / 2 + (s.y / s.z) * w;
                    let ppx = w / 2 + (s.x / s.pz) * w, ppy = h / 2 + (s.y / s.pz) * w;
                    let alpha = Math.min(1, 1.2 - s.z / w);
                    starCtx.strokeStyle = `rgba(255,255,255,${alpha})`;
                    starCtx.lineWidth = Math.min(3, (w / s.z) * 0.8);
                    starCtx.beginPath(); starCtx.moveTo(ppx, ppy); starCtx.lineTo(px, py); starCtx.stroke();
                }

                // DRAW SHOOTING STARS WITH GLOW
                for (let i = shootingStars.length - 1; i >= 0; i--) {
                    let s = shootingStars[i];
                    s.x += s.vx; s.y += s.vy; s.opacity -= 0.015;
                    if (s.opacity <= 0) { shootingStars.splice(i, 1); continue; }

                    starCtx.save();
                    // Glow effect Layers
                    for (let j = 3; j > 0; j--) {
                        starCtx.shadowBlur = j * 10; starCtx.shadowColor = 'rgba(0, 229, 255, 0.8)';
                        starCtx.strokeStyle = `rgba(0, 229, 255, ${s.opacity * 0.3})`;
                        starCtx.lineWidth = j * 2;
                        starCtx.beginPath(); starCtx.moveTo(s.x, s.y);
                        starCtx.lineTo(s.x - s.vx * (s.len / 10), s.y - s.vy * (s.len / 10)); starCtx.stroke();
                    }
                    // Core
                    starCtx.fillStyle = `rgba(255,255,255,${s.opacity})`;
                    starCtx.beginPath(); starCtx.arc(s.x, s.y, 2, 0, 7); starCtx.fill();
                    starCtx.restore();
                }
                requestAnimationFrame(draw);
            }
            draw();

            // Logic Pass & Game Start
            const SECRET = 'a3NhbWFzdXByZW1hY3k=';
            document.getElementById('unlock-btn').onclick = () => {
                const inp = document.getElementById('password-input');
                if (btoa(inp.value) === SECRET) {
                    document.getElementById('lock-screen').style.display = 'none';
                    document.getElementById('fake-start-btn').style.display = 'block';
                } else { document.getElementById('error-msg').style.visibility = 'visible'; inp.value = ''; }
            };

            document.getElementById('fake-start-btn').onclick = () => {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('ui-wrapper').style.background = 'transparent';
                document.getElementById('ui-wrapper').style.backdropFilter = 'none';
                document.getElementById('loading-screen').style.display = 'flex';
                isWarping = true; targetSpeed = 55;
                let p = 0; const b = document.getElementById('prog-bar');
                const iv = setInterval(() => { p += 1.1; b.style.width = p + '%'; if (p >= 100) clearInterval(iv); }, 30);
                setTimeout(() => {
                    isRunning = false; document.getElementById('easter-egg-overlay').style.display = 'none';
                    const realBtn = document.getElementById('startBtn');
                    if (realBtn) { realBtn.style.display = 'none'; realBtn.click(); }
                }, 3000);
            };
        })();
    </script>
    <script src="js/config.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/render.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
