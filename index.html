<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thần Binh Thiên Hà - Top Secret Edition</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&family=Courier+New&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Nền Vũ trụ 3D */
        #three-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        /* Khung UI đè lên trên */
        #ui-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            pointer-events: all;
            background: rgba(10, 25, 47, 0.4);
            backdrop-filter: blur(5px);
            /* Làm mờ nhẹ nền Three.js */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Form UI */
        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #password-input {
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #00e5ff;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            width: 250px;
            font-family: inherit;
        }

        #password-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #unlock-btn,
        #fake-start-btn {
            padding: 12px 35px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
        }

        #unlock-btn {
            background: linear-gradient(45deg, #f72585, #7209b7);
            box-shadow: 0 0 15px rgba(247, 37, 133, 0.4);
        }

        #unlock-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(247, 37, 133, 0.7);
        }

        #fake-start-btn {
            display: none;
            background: linear-gradient(45deg, #00e5ff, #007bff);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        #fake-start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.7);
        }

        #error-msg {
            color: #f72585;
            font-size: 0.9rem;
            margin-top: 15px;
            visibility: hidden;
            text-shadow: 0 0 5px red;
        }

        /* Giao diện Loading */
        #loading-screen {
            background: transparent;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #00e5ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-top: 25px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="three-container"></div>

    <div id="ui-wrapper">
        <div id="lock-screen">
            <h1
                style="color: #f72585; font-size: 2.5rem; text-shadow: 0 0 15px #f72585; margin-bottom: 5px; font-family: 'Playfair Display', serif;">
                RESTRICTED AREA</h1>
            <p style="color: #a0c4ff; margin-bottom: 30px; font-family: 'Roboto', sans-serif;">This fairy tale is
                classified. Enter password to unlock.</p>

            <input type="password" id="password-input" placeholder="Enter password...">
            <button id="unlock-btn">Unlock Story</button>
            <button id="fake-start-btn">View Fairy Tale</button>

            <p id="error-msg">❌ Access Denied: Incorrect Password.</p>
        </div>

        <div id="loading-screen">
            <h1
                style="color: #fff; letter-spacing: 3px; text-shadow: 0 0 15px #fff; font-family: 'Playfair Display', serif;">
                SYSTEM LOADING</h1>
            <p style="color: #fff; font-family: 'Roboto', sans-serif;">Initiating hyperdrive...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <div id="game-wrapper" style="display: none; width: 100vw; height: 100vh; position: absolute; z-index: 10;">
        <canvas id="gameCanvas"></canvas>
        <button id="startBtn">Start</button>
    </div>

    <script>
        // 1. Cài đặt Cảnh 3D cơ bản
        const scene = new THREE.Scene();
        // Viewpoint không gian 3 chiều tiến về phía trước
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 1; // Đặt camera ở gốc trục Z
        camera.rotation.x = Math.PI / 2; // Quay camera ngửa lên để nhìn dọc trục Y

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three-container').appendChild(renderer.domElement);

        // 2. Tạo Đám mây điểm: Hàng nghìn ngôi sao
        const starGeo = new THREE.BufferGeometry();
        const starCount = 10000; // Tăng lên 10,000 ngôi sao để trông rộng lớn
        const posArray = new Float32Array(starCount * 3); // Mảng tọa độ X, Y, Z cho mỗi sao

        for (let i = 0; i < starCount * 3; i++) {
            // Rải đều sao ra xa xung quanh gốc tọa độ
            posArray[i] = (Math.random() - 0.5) * 800;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

        // 3. Phủ vật liệu: Tất cả các sao đều màu trắng
        const starMaterial = new THREE.PointsMaterial({
            color: 0xffffff, // MÀU TRẮNG PURE
            size: 0.8, // Kích thước sao vừa phải
            transparent: true,
            opacity: 0.8 // Hơi mờ nhẹ để tạo chiều sâu
        });

        const stars = new THREE.Points(starGeo, starMaterial);
        scene.add(stars);

        let warpSpeed = 0.5; // Tốc độ bay rảnh rỗi ban đầu rất chậm

        // 4. Vòng lặp Render liên tục để tạo chuyển động
        function animate() {
            const positions = starGeo.attributes.position.array;

            // Duyệt qua từng ngôi sao (mỗi sao chiếm 3 giá trị X, Y, Z trong mảng)
            for (let i = 1; i < starCount * 3; i += 3) {
                // Giảm tọa độ trục Y để tạo cảm giác sao bay lùi lại (camera đang nhìn lên)
                positions[i] -= warpSpeed;

                // Thuật toán tái chế: Nếu sao bay quá xa đằng sau, ném nó lại tít đằng trước
                if (positions[i] < -400) {
                    positions[i] = 400;
                }
            }
            // Báo cho Three.js biết dữ liệu vị trí đã thay đổi
            starGeo.attributes.position.needsUpdate = true;

            // Xoay nhẹ cả vũ trụ cho ma mị, tạo cảm giác viewpoint 3D
            stars.rotation.y += 0.001;

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        animate(); // Kích hoạt vũ trụ
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const CORRECT_PASSWORD = 'ksamasupremacy';

            const lockScreen = document.getElementById('lock-screen');
            const loadingScreen = document.getElementById('loading-screen');
            const gameWrapper = document.getElementById('game-wrapper');
            const uiWrapper = document.getElementById('ui-wrapper');

            const passwordInput = document.getElementById('password-input');
            const unlockBtn = document.getElementById('unlock-btn');
            const fakeStartBtn = document.getElementById('fake-start-btn');
            const errorMsg = document.getElementById('error-msg');
            const realStartBtn = document.getElementById('startBtn');

            function checkPassword() {
                if (passwordInput.value === CORRECT_PASSWORD) {
                    errorMsg.style.visibility = 'hidden';
                    passwordInput.style.display = 'none';
                    unlockBtn.style.display = 'none';

                    fakeStartBtn.style.display = 'block';
                    lockScreen.querySelector('h1').innerText = '✅ ACCESS GRANTED';
                    lockScreen.querySelector('h1').style.color = '#fff';
                    lockScreen.querySelector('h1').style.textShadow = '0 0 15px #fff';
                } else {
                    errorMsg.style.visibility = 'visible';
                    passwordInput.style.borderColor = '#f72585';
                    passwordInput.value = '';
                }
            }

            unlockBtn.addEventListener('click', checkPassword);
            passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });

            // Khi nhấn nút View Fairy Tale
            fakeStartBtn.addEventListener('click', () => {
                lockScreen.style.display = 'none';
                loadingScreen.style.display = 'flex';

                // HIỆU ỨNG TĂNG TỐC ĐỘT NGỘT: Đẩy warpSpeed lên cao để tạo cú nhảy không gian
                warpSpeed = 25; // Tăng tốc độ bay rất nhanh

                setTimeout(() => {
                    uiWrapper.style.display = 'none'; // Tắt mờ UI
                    document.getElementById('three-container').style.display = 'none'; // Tắt vũ trụ 3D
                    gameWrapper.style.display = 'block'; // Hiện Game chính

                    if (realStartBtn) realStartBtn.click(); // Tự động bấm nút Start gốc
                    document.body.style.overflow = 'auto'; // Khôi phục thanh cuộn
                }, 3500); // Kéo dài thời gian loading lên 3.5 giây để ngắm sao băng
            });

            // Tự động điều chỉnh Canvas 3D khi thay đổi kích thước cửa sổ
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        });
    </script>

    <script src="js/config.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/render.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
