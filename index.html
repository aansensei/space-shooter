<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thần Binh Thiên Hà - Top Secret Edition</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&family=Courier+New&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* --- LỚP PHỦ EASTER EGG BẢO VỆ TOÀN MÀN HÌNH --- */
        #easter-egg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99999;
            /* Đè lên toàn bộ game gốc */
            background: #000;
        }

        /* Nền Vũ trụ Canvas */
        #star-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Khung UI đè lên trên */
        #ui-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: all;
            background: rgba(10, 25, 47, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: background 1s ease, backdrop-filter 1s ease;
        }

        /* Form UI */
        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #password-input {
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #00e5ff;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            width: 250px;
            font-family: inherit;
        }

        #password-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #unlock-btn,
        #fake-start-btn {
            padding: 12px 35px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
        }

        #unlock-btn {
            background: linear-gradient(45deg, #f72585, #7209b7);
            box-shadow: 0 0 15px rgba(247, 37, 133, 0.4);
        }

        #unlock-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(247, 37, 133, 0.7);
        }

        #fake-start-btn {
            display: none;
            background: linear-gradient(45deg, #00e5ff, #007bff);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        #fake-start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.7);
        }

        #error-msg {
            color: #f72585;
            font-size: 0.9rem;
            margin-top: 15px;
            visibility: hidden;
            text-shadow: 0 0 5px red;
        }

        /* Giao diện Loading & Thanh Progress */
        #loading-screen {
            background: transparent;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .progress-container {
            width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00e5ff;
            border-radius: 10px;
            margin-top: 25px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #00e5ff;
            box-shadow: 0 0 15px #00e5ff;
            transition: width 3.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>
    <button id="startBtn" style="display: none;">Start</button>

    <div id="easter-egg-overlay">
        <canvas id="star-canvas"></canvas>

        <div id="ui-wrapper">
            <div id="lock-screen">
                <h1
                    style="color: #f72585; font-size: 2.5rem; text-shadow: 0 0 15px #f72585; margin-bottom: 5px; font-family: 'Playfair Display', serif;">
                    RESTRICTED AREA</h1>
                <p style="color: #a0c4ff; margin-bottom: 30px; font-family: 'Roboto', sans-serif;">This fairy tale is
                    classified. Enter password to unlock.</p>

                <input type="password" id="password-input" placeholder="Enter password...">
                <button id="unlock-btn">Unlock Story</button>
                <button id="fake-start-btn">View Fairy Tale</button>

                <p id="error-msg">❌ Access Denied: Incorrect Password.</p>
            </div>

            <div id="loading-screen">
                <h1
                    style="color: #fff; letter-spacing: 3px; text-shadow: 0 0 15px #fff; font-family: 'Playfair Display', serif;">
                    SYSTEM LOADING</h1>
                <p style="color: #fff; font-family: 'Roboto', sans-serif; margin-bottom: 0;">Initiating hyperdrive
                    jump...</p>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Bọc toàn bộ trong IIFE để code an toàn, không đụng chạm game chính
        (() => {
            const starCanvas = document.getElementById('star-canvas');
            const ctx = starCanvas.getContext('2d');

            let width = window.innerWidth;
            let height = window.innerHeight;
            starCanvas.width = width;
            starCanvas.height = height;

            const stars = [];
            const numStars = 3000;
            let speed = 0.5; // Đủ nhanh để thấy sao đang bay lại gần
            let targetSpeed = 0.5;
            let isWarping = false;
            let isSimulationRunning = true;

            // Khởi tạo các vì sao
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: (Math.random() - 0.5) * width * 2,
                    y: (Math.random() - 0.5) * height * 2,
                    z: Math.random() * width
                });
            }

            function drawStars() {
                if (!isSimulationRunning) return;

                // Gia tốc mượt mà khi đổi tốc độ
                speed += (targetSpeed - speed) * 0.02;

                // NGUYÊN LÝ THỊ GIÁC:
                // - Bình thường: Nền đen đặc sắc nét -> Thấy rõ chấm tròn
                // - Lúc Warp: Nền mờ trong suốt -> Tạo đuôi sao chổi vệt dài
                if (isWarping) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                } else {
                    ctx.fillStyle = '#000000';
                }
                ctx.fillRect(0, 0, width, height);

                const cx = width / 2;
                const cy = height / 2;

                for (let i = 0; i < numStars; i++) {
                    let star = stars[i];
                    star.z -= speed;

                    // Reset sao khi bay sát mặt màn hình
                    if (star.z <= 0) {
                        star.x = (Math.random() - 0.5) * width * 2;
                        star.y = (Math.random() - 0.5) * height * 2;
                        star.z = width;
                    }

                    // Tính phối cảnh 3D
                    let px = cx + (star.x / star.z) * width;
                    let py = cy + (star.y / star.z) * width;
                    let radius = (width / star.z) * 1.5;
                    radius = Math.max(0.5, Math.min(5, radius)); // Giới hạn kích thước tránh loang to quá

                    let alpha = 1.2 - (star.z / width);
                    alpha = Math.max(0.1, Math.min(1, alpha));

                    if (isWarping) {
                        // VẼ VỆT SÁNG (Dùng lineTo)
                        let prevZ = star.z + speed;
                        let prevPx = cx + (star.x / prevZ) * width;
                        let prevPy = cy + (star.y / prevZ) * width;

                        ctx.lineWidth = radius;
                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.beginPath();
                        ctx.moveTo(prevPx, prevPy);
                        ctx.lineTo(px, py);
                        ctx.stroke();
                    } else {
                        // VẼ CHẤM SAO TRÒN SẮC NÉT (Dùng arc)
                        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(px, py, radius, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                requestAnimationFrame(drawStars);
            }
            drawStars();

            window.addEventListener('resize', () => {
                width = window.innerWidth;
                height = window.innerHeight;
                starCanvas.width = width;
                starCanvas.height = height;
            });

            // LOGIC XỬ LÝ GIAO DIỆN
            const SECRET_CODE = 'a3NhbWFzdXByZW1hY3k=';
            const lockScreen = document.getElementById('lock-screen');
            const loadingScreen = document.getElementById('loading-screen');
            const uiWrapper = document.getElementById('ui-wrapper');
            const easterEggOverlay = document.getElementById('easter-egg-overlay');
            const progressBar = document.getElementById('progress-bar');
            const passwordInput = document.getElementById('password-input');
            const unlockBtn = document.getElementById('unlock-btn');
            const fakeStartBtn = document.getElementById('fake-start-btn');
            const errorMsg = document.getElementById('error-msg');
            const realStartBtn = document.getElementById('startBtn');

            function checkPassword() {
                if (btoa(passwordInput.value) === SECRET_CODE) {
                    errorMsg.style.visibility = 'hidden';
                    passwordInput.style.display = 'none';
                    unlockBtn.style.display = 'none';
                    fakeStartBtn.style.display = 'block';
                    lockScreen.querySelector('h1').innerText = '✅ ACCESS GRANTED';
                    lockScreen.querySelector('h1').style.color = '#fff';
                    lockScreen.querySelector('h1').style.textShadow = '0 0 15px #fff';
                } else {
                    errorMsg.style.visibility = 'visible';
                    passwordInput.style.borderColor = '#f72585';
                    passwordInput.value = '';
                }
            }

            unlockBtn.addEventListener('click', checkPassword);
            passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });

            fakeStartBtn.addEventListener('click', () => {
                // Đổi UI sang trạng thái Loading
                lockScreen.style.display = 'none';
                uiWrapper.style.backdropFilter = 'none';
                uiWrapper.style.background = 'transparent';
                loadingScreen.style.display = 'flex';

                // KÍCH HOẠT HIỆU ỨNG WARP (Đổi style và tăng tốc độ)
                isWarping = true;
                targetSpeed = 40;

                // Chạy thanh progress
                setTimeout(() => {
                    progressBar.style.width = '100%';
                }, 50);

                // Sau 3.5s dọn dẹp hệ thống và vào game thật
                setTimeout(() => {
                    isSimulationRunning = false;
                    easterEggOverlay.style.display = 'none';

                    if (realStartBtn) {
                        realStartBtn.style.display = 'none';
                        realStartBtn.click();
                    }
                }, 3500);
            });
        })();
    </script>

    <script src="js/config.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/render.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
