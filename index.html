<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Thần Binh Thiên Hà - Top Secret Edition</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@400;500&family=Courier+New&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* LỚP 1: MÀN HÌNH VŨ TRỤ (Nằm đè lên game gốc) */
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9998;
            pointer-events: none;
            background: #000;
        }

        /* LỚP 2: KHUNG GIAO DIỆN BẢO MẬT */
        #ui-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            pointer-events: all;
            background: rgba(10, 25, 47, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Giao diện Mật khẩu */
        #lock-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #password-input {
            padding: 12px 20px;
            border-radius: 30px;
            border: 2px solid #00e5ff;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            width: 250px;
            font-family: inherit;
        }

        #password-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        #unlock-btn,
        #fake-start-btn {
            padding: 12px 35px;
            border-radius: 30px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
            font-size: 1.1rem;
            font-family: inherit;
        }

        #unlock-btn {
            background: linear-gradient(45deg, #f72585, #7209b7);
            box-shadow: 0 0 15px rgba(247, 37, 133, 0.4);
        }

        #unlock-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(247, 37, 133, 0.7);
        }

        #fake-start-btn {
            display: none;
            background: linear-gradient(45deg, #00e5ff, #007bff);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        #fake-start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.7);
        }

        #error-msg {
            color: #f72585;
            font-size: 0.9rem;
            margin-top: 15px;
            visibility: hidden;
            text-shadow: 0 0 5px red;
        }

        /* Giao diện Loading */
        #loading-screen {
            background: transparent;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #00e5ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-top: 25px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <canvas id="star-canvas"></canvas>

    <div id="ui-wrapper">
        <div id="lock-screen">
            <h1
                style="color: #f72585; font-size: 2.5rem; text-shadow: 0 0 15px #f72585; margin-bottom: 5px; font-family: 'Playfair Display', serif;">
                RESTRICTED AREA</h1>
            <p style="color: #a0c4ff; margin-bottom: 30px; font-family: 'Roboto', sans-serif;">This fairy tale is
                classified. Enter password to unlock.</p>

            <input type="password" id="password-input" placeholder="Enter password...">
            <button id="unlock-btn">Unlock Story</button>
            <button id="fake-start-btn">View Fairy Tale</button>

            <p id="error-msg">❌ Access Denied: Incorrect Password.</p>
        </div>

        <div id="loading-screen">
            <h1
                style="color: #fff; letter-spacing: 3px; text-shadow: 0 0 15px #fff; font-family: 'Playfair Display', serif;">
                SYSTEM LOADING</h1>
            <p style="color: #fff; font-family: 'Roboto', sans-serif;">Initiating hyperdrive jump...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <button id="startBtn">Start</button>

    <script>
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const stars = [];
        const numStars = 3000; // 3000 vì sao
        let speed = 0.5;
        let isWarping = false;
        let isSimulationRunning = true; // Biến "công tắc" để tắt vũ trụ

        // Khởi tạo các vì sao
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: Math.random() * width - width / 2,
                y: Math.random() * height - height / 2,
                z: Math.random() * width,
                pz: Math.random() * width // PZ cho thuật toán tia sáng bản cũ
            });
        }

        function drawStars() {
            // FIX LỖI ĐỨNG GAME: Tắt hẳn vòng lặp nếu game gốc bắt đầu
            if (!isSimulationRunning) return;

            if (isWarping) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            } else {
                ctx.fillStyle = '#000000';
            }
            ctx.fillRect(0, 0, width, height);

            const cx = width / 2;
            const cy = height / 2;

            for (let i = 0; i < numStars; i++) {
                let star = stars[i];

                star.pz = star.z;
                star.z -= speed;

                // Reset sao nếu bay qua màn hình
                if (star.z <= 0) {
                    star.x = Math.random() * width - cx;
                    star.y = Math.random() * height - cy;
                    star.z = width;
                    star.pz = width;
                }

                let px = cx + (star.x / star.z) * width;
                let py = cy + (star.y / star.z) * width;
                let radius = (width / star.z) * 1.5;

                // THUẬT TOÁN ĐỘ SÁNG MỚI: Tiến lại gần là RÕ 100%
                let alpha = 1.5 - (star.z / (width / 2));
                alpha = Math.max(0.1, Math.min(1, alpha));

                if (isWarping) {
                    // PHIÊN BẢN CŨ YÊU THÍCH: Vệt sáng tia chớp
                    let prevPx = cx + (star.x / star.pz) * width;
                    let prevPy = cy + (star.y / star.pz) * width;

                    ctx.lineWidth = radius;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.beginPath();
                    ctx.moveTo(prevPx, prevPy);
                    ctx.lineTo(px, py);
                    ctx.stroke();
                } else {
                    // LÀM SÁNG RÕ KHÔNG BỊ BLUR:
                    // 1. Quầng hào quang phát sáng (Halo)
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.2})`;
                    ctx.beginPath();
                    ctx.arc(px, py, radius * 3.5, 0, Math.PI * 2);
                    ctx.fill();

                    // 2. Lõi sao cực kỳ sắc bén (Core)
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(px, py, radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            requestAnimationFrame(drawStars);
        }
        drawStars();

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const SECRET_CODE = 'a3NhbWFzdXByZW1hY3k=';

            const lockScreen = document.getElementById('lock-screen');
            const loadingScreen = document.getElementById('loading-screen');
            const starCanvas = document.getElementById('star-canvas');
            const uiWrapper = document.getElementById('ui-wrapper');

            const passwordInput = document.getElementById('password-input');
            const unlockBtn = document.getElementById('unlock-btn');
            const fakeStartBtn = document.getElementById('fake-start-btn');
            const errorMsg = document.getElementById('error-msg');

            const realStartBtn = document.getElementById('startBtn'); // Nút gốc của game bạn

            function checkPassword() {
                if (btoa(passwordInput.value) === SECRET_CODE) {
                    errorMsg.style.visibility = 'hidden';
                    passwordInput.style.display = 'none';
                    unlockBtn.style.display = 'none';

                    fakeStartBtn.style.display = 'block';
                    lockScreen.querySelector('h1').innerText = '✅ ACCESS GRANTED';
                    lockScreen.querySelector('h1').style.color = '#fff';
                    lockScreen.querySelector('h1').style.textShadow = '0 0 15px #fff';
                } else {
                    errorMsg.style.visibility = 'visible';
                    passwordInput.style.borderColor = '#f72585';
                    passwordInput.value = '';
                }
            }

            unlockBtn.addEventListener('click', checkPassword);
            passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkPassword(); });

            fakeStartBtn.addEventListener('click', () => {
                lockScreen.style.display = 'none';
                loadingScreen.style.display = 'flex';

                isWarping = true;
                speed = 35; // Tốc độ warp

                setTimeout(() => {
                    // 1. TẮT HẲN VÒNG LẶP RENDER VŨ TRỤ ĐỂ CỨU CPU
                    isSimulationRunning = false;

                    // 2. Kéo rèm che đi
                    uiWrapper.style.display = 'none';
                    starCanvas.style.display = 'none';

                    // 3. Gọi lệnh bấm nút Start của Game
                    if (realStartBtn) {
                        realStartBtn.click();
                        realStartBtn.style.display = 'none'; // Giấu nút sau khi bấm
                    }

                    document.body.style.overflow = 'auto';
                }, 3000);
            });
        });
    </script>

    <script src="js/config.js"></script>
    <script src="js/entities.js"></script>
    <script src="js/skills.js"></script>
    <script src="js/render.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
